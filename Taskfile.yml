version: "3"

tasks:
  build:
    desc: "Build detected project components"
    cmds:
      - |
        set -eu

        if [ -f pyproject.toml ]; then
          uv build
        fi

        if [ -f package.json ]; then
          bun run build
        fi

        if [ -f go.mod ]; then
          go build ./...
        fi

        if [ -f Cargo.toml ]; then
          cargo build
        fi

  test:
    desc: "Run detected test suites"
    cmds:
      - |
        set -eu

        if [ -f pyproject.toml ]; then
          uv run pytest
        fi

        if [ -f package.json ]; then
          bun run test
        fi

        if [ -f go.mod ]; then
          go test ./...
        fi

        if [ -f Cargo.toml ]; then
          cargo test
        fi

  lint:
    desc: "Run detected linters"
    cmds:
      - |
        set -eu

        if [ -f pyproject.toml ]; then
          uv run ruff check .
          uv run ruff format --check .
        fi

        if [ -f package.json ]; then
          bun run lint
        fi

        if [ -f go.mod ]; then
          golangci-lint run
        fi

        if [ -f Cargo.toml ]; then
          cargo clippy --all-targets --all-features -- -D warnings
        fi

  clean:
    desc: "Remove build artifacts for detected project components"
    cmds:
      - |
        set -eu

        if [ -f pyproject.toml ]; then
          rm -rf .pytest_cache .ruff_cache .mypy_cache .coverage htmlcov dist build
        fi

        if [ -f package.json ]; then
          rm -rf node_modules .turbo frontend/dist frontend/.turbo
        fi

        if [ -f go.mod ]; then
          rm -rf bin coverage.out
        fi

        if [ -f Cargo.toml ]; then
          cargo clean
        fi

  quality:
    desc: "Run lint and test"
    cmds:
      - task: lint
      - task: test

  sync:
    desc: "Sync Python dependencies"
    cmds:
      - uv sync
