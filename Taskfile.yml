version: "3"

tasks:
  build:
    desc: Build the detected Python package
    cmds:
      - |
        set -eu

        uv build

  test:
    desc: Run the detected Python test suite
    cmds:
      - |
        set -eu

        uv run pytest

  lint:
    desc: Run the detected Python linters and format check
    cmds:
      - |
        set -eu

        uv run ruff check .
        uv run ruff format --check .

  clean:
    desc: Remove Python build and test artifacts
    cmds:
      - |
        set -eu

        rm -rf .pytest_cache .ruff_cache .mypy_cache .coverage htmlcov dist build
        find . -type d -name __pycache__ -prune -exec rm -rf {} +
