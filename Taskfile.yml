version: '3'

vars:
  PLATFORM:
    sh: uname -s | tr '[:upper:]' '[:lower:]'
  PC_CONFIG: >-
    {{if eq .PLATFORM "linux"}}
    -f config/process-compose.yaml -f config/process-compose.linux.yaml
    {{else if contains "mingw" .PLATFORM}}
    -f config/process-compose.yaml -f config/process-compose.windows.yaml
    {{else}}
    -f config/process-compose.yaml
    {{end}}
  PYTHONPATH:
    sh: pwd
  SMART_CMD: bash scripts/shell/smart-command.sh
  FORMATTER: python3 {{.PYTHONPATH}}/scripts/python/test-summary-formatter.py

includes:
  go:
    taskfile: backend/Taskfile.yml
    dir: backend
  gateway:
    taskfile: Taskfile.gateway.yml

tasks:
  default:
    cmds:
      - task --list

  install:
    desc: "Install all native dependencies"
    cmds:
      - bash scripts/shell/setup-native-dev.sh

  dev:
    desc: "Start dev environment (detached)"
    cmds:
      - PYTHONPATH="{{.PYTHONPATH}}/src" PC_CONFIG="{{.PC_CONFIG}}" python3 scripts/python/dev-start-with-preflight.py up -d --logs-truncate

  dev:tui:
    desc: "Start dev environment (TUI)"
    cmds:
      - PYTHONPATH="{{.PYTHONPATH}}/src" PC_CONFIG="{{.PC_CONFIG}}" python3 scripts/python/dev-start-with-preflight.py up --logs-truncate

  dev:down:
    desc: "Stop all services"
    cmds:
      - process-compose down --port 18080

  dev:logs:
    desc: "Show logs for all services"
    cmds:
      - process-compose logs --port 18080

  dev:status:
    desc: "Show service status"
    cmds:
      - process-compose process list --port 18080

  format:
    desc: "Format all code"
    cmds:
      - poe format
      - task: go:format
      - bun run --cwd frontend format

  check:
    desc: "Run static checks and linting"
    cmds:
      - poe check
      - task: go:lint
      - bun run --cwd frontend check

  lint:
    desc: "Consolidated linting"
    cmds:
      - task: lint:naming
      - task: go:lint
      - task: lint:python
      - task: lint:frontend

  lint:python:
    desc: "Python linting"
    cmds:
      - ruff check src/ tests/ --output-format=grouped

  lint:frontend:
    desc: "Frontend linting"
    cmds:
      - bun run --cwd frontend lint

  lint:naming:
    desc: "Naming explosion guards"
    cmds:
      - bash scripts/shell/check-file-loc.sh
      - bash scripts/shell/check-naming-explosion-python.sh
      - bash scripts/shell/check-naming-explosion-go.sh
      - cd frontend && bash scripts/check-naming-explosion.sh

  test:
    desc: "Run all tests"
    cmds:
      - task: go:test
      - task: test:python
      - task: test:frontend

  test:python:
    desc: "Python tests"
    cmds:
      - PYTHONPATH="{{.PYTHONPATH}}/src" pytest tests/ -v -n auto --cov=src/tracertm --cov-report=html

  test:go:
    desc: "Go tests"
    cmds:
      - task: go:test

  test:frontend:
    desc: "Frontend tests"
    cmds:
      - bun run --cwd frontend test

  test:unit:
    desc: "Run unit tests across all languages"
    cmds:
      - task: go:test:unit
      - PYTHONPATH="{{.PYTHONPATH}}/src" pytest tests/ -v -m "unit and not slow"
      - bun run --cwd frontend/apps/web test --run

  test:integration:
    desc: "Run integration tests"
    cmds:
      - task: go:test:integration
      - PYTHONPATH="{{.PYTHONPATH}}/src" pytest backend/tests/integration/test_full_agent_lifecycle.py -v

  test:e2e:
    desc: "Run E2E tests"
    cmds:
      - task: go:test:e2e
      - PYTHONPATH="{{.PYTHONPATH}}/src" pytest tests/ -v -m e2e
      - bun run --cwd frontend/apps/web test:e2e

  metrics:
    desc: "Run metrics"
    cmds:
      - poe metrics

  quality:
    desc: "Run full quality suite"
    cmds:
      - bash scripts/shell/run-quality-split.sh

  validate:
    desc: "Comprehensive route & health validation"
    cmds:
      - task: test:validate:frontend
      - task: test:validate:backend

  test:validate:frontend:
    desc: "Frontend validation"
    cmds:
      - cd frontend/apps/web && bun run test:e2e -- websocket-validation.spec.ts
      - cd frontend/apps/web && bun run test:e2e -- route-validation.spec.ts
      - cd frontend/apps/web && bun run test -- src/__tests__/api/routes-validation.comprehensive.test.ts

  test:validate:backend:
    desc: "Backend validation"
    cmds:
      - task: go:test:validate
      - PYTHONPATH="{{.PYTHONPATH}}/src" pytest backend/tests/unit/api/test_routes_validation.py -v

  db:migrate:
    desc: "Run database migrations"
    cmds:
      - alembic upgrade head

  db:rollback:
    desc: "Rollback last migration"
    cmds:
      - alembic downgrade -1

  db:reset:
    desc: "Reset database"
    cmds:
      - alembic downgrade base
      - alembic upgrade head

  proto:gen:
    desc: "Generate gRPC code"
    cmds:
      - bash scripts/shell/generate-grpc.sh

  grafana:dashboard:
    desc: "Open Grafana in browser"
    cmds:
      - open http://localhost:3000 || xdg-open http://localhost:3000 || echo "Open http://localhost:3000"

  prometheus:ui:
    desc: "Open Prometheus in browser"
    cmds:
      - open http://localhost:9090 || xdg-open http://localhost:9090 || echo "Open http://localhost:9090"
