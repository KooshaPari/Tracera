version: "3"

vars:
  GO_MODULE_FIND_ARGS: >-
    -name go.mod
    -not -path './.git/*'
    -not -path './vendor/*'
    -not -path './node_modules/*'
    -not -path './ARCHIVE/*'
    -not -path './.archive/*'
    -not -path './default/*'
  FRONTEND_DIR: frontend

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  build:
    desc: Build all detected Python, Go, and Bun workspaces
    deps:
      - build:python
      - build:go
      - build:bun

  build:python:
    desc: Build the Python package when pyproject.toml is present
    cmds:
      - |
        set -eu
        if [ -f pyproject.toml ]; then
          uv build
        fi

  build:go:
    desc: Build detected Go modules
    cmds:
      - |
        set -eu
        find . {{.GO_MODULE_FIND_ARGS}} -print | while IFS= read -r module; do
          module_dir="$(dirname "$module")"
          (cd "$module_dir" && go build ./...)
        done

  build:bun:
    desc: Build the Bun workspace when a package.json build script is present
    cmds:
      - |
        set -eu
        has_script() {
          node -e "const p=require('./package.json'); process.exit(p.scripts?.[process.argv[1]] ? 0 : 1)" "$1"
        }

        if [ -f "{{.FRONTEND_DIR}}/package.json" ] && (cd "{{.FRONTEND_DIR}}" && has_script build); then
          bun --cwd "{{.FRONTEND_DIR}}" run build
        elif [ -f package.json ] && has_script build; then
          bun run build
        fi

  test:
    desc: Run all detected Python, Go, and Bun test suites
    deps:
      - test:python
      - test:go
      - test:bun

  test:python:
    desc: Run Python tests when pyproject.toml and tests/ are present
    cmds:
      - |
        set -eu
        if [ -f pyproject.toml ] && [ -d tests ]; then
          uv run pytest
        fi

  test:go:
    desc: Run tests for detected Go modules
    cmds:
      - |
        set -eu
        find . {{.GO_MODULE_FIND_ARGS}} -print | while IFS= read -r module; do
          module_dir="$(dirname "$module")"
          (cd "$module_dir" && go test ./...)
        done

  test:bun:
    desc: Run Bun workspace tests when a package.json test script is present
    cmds:
      - |
        set -eu
        has_script() {
          node -e "const p=require('./package.json'); process.exit(p.scripts?.[process.argv[1]] ? 0 : 1)" "$1"
        }

        if [ -f "{{.FRONTEND_DIR}}/package.json" ] && (cd "{{.FRONTEND_DIR}}" && has_script test); then
          bun --cwd "{{.FRONTEND_DIR}}" run test
        elif [ -f package.json ] && has_script test; then
          bun run test
        fi

  lint:
    desc: Run all detected Python, Go, and Bun lint and format checks
    deps:
      - lint:python
      - lint:go
      - lint:bun

  lint:python:
    desc: Run Python Ruff lint and format checks when pyproject.toml is present
    cmds:
      - |
        set -eu
        if [ -f pyproject.toml ]; then
          uv run ruff check .
          uv run ruff format --check .
        fi

  lint:go:
    desc: Run Go formatting and vet checks for detected Go modules
    cmds:
      - |
        set -eu
        find . {{.GO_MODULE_FIND_ARGS}} -print | while IFS= read -r module; do
          module_dir="$(dirname "$module")"
          unformatted="$(cd "$module_dir" && gofmt -l .)"
          if [ -n "$unformatted" ]; then
            printf '%s\n' "$unformatted"
            exit 1
          fi
          (cd "$module_dir" && go vet ./...)
        done

  lint:bun:
    desc: Run Bun workspace lint and type checks when package scripts are present
    cmds:
      - |
        set -eu
        has_script() {
          node -e "const p=require('./package.json'); process.exit(p.scripts?.[process.argv[1]] ? 0 : 1)" "$1"
        }

        if [ -f "{{.FRONTEND_DIR}}/package.json" ]; then
          (
            cd "{{.FRONTEND_DIR}}"
            if has_script lint; then
              bun run lint
            fi
            if has_script typecheck; then
              bun run typecheck
            fi
          )
        elif [ -f package.json ]; then
          if has_script lint; then
            bun run lint
          fi
          if has_script typecheck; then
            bun run typecheck
          fi
        fi

  clean:
    desc: Remove detected Python, Go, and frontend build/test artifacts
    cmds:
      - |
        set -eu

        rm -rf .pytest_cache .ruff_cache .mypy_cache .coverage htmlcov dist build
        find . -type d -name __pycache__ -prune -exec rm -rf {} +

        find . {{.GO_MODULE_FIND_ARGS}} -print | while IFS= read -r module; do
          module_dir="$(dirname "$module")"
          (cd "$module_dir" && go clean -cache -testcache)
        done

        if [ -f "{{.FRONTEND_DIR}}/package.json" ]; then
          if node -e "const p=require('./{{.FRONTEND_DIR}}/package.json'); process.exit(p.scripts?.clean ? 0 : 1)"; then
            bun --cwd "{{.FRONTEND_DIR}}" run clean
          else
            rm -rf "{{.FRONTEND_DIR}}/.turbo" "{{.FRONTEND_DIR}}/coverage" "{{.FRONTEND_DIR}}"/apps/*/dist "{{.FRONTEND_DIR}}"/apps/*/build
            find "{{.FRONTEND_DIR}}" -type d \( -name dist -o -name build -o -name coverage \) -prune -exec rm -rf {} +
          fi
        elif [ -f package.json ]; then
          if node -e "const p=require('./package.json'); process.exit(p.scripts?.clean ? 0 : 1)"; then
            bun run clean
          fi
        fi
