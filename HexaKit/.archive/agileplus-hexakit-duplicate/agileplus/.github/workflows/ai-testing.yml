name: Testing Infrastructure

on:
  push:
    branches: [main, feat/**]
    paths:
      - 'tests/**'
      - 'vitest.config.ts'
      - 'playwright.config.ts'
      - '**.rs'
  pull_request:
    paths:
      - 'tests/**'
      - 'vitest.config.ts'
      - 'playwright.config.ts'
  schedule:
    - cron: '0 3 * * *'  # Weekly test run

jobs:
  bdd-tests:
    name: BDD Feature Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cucumber
        run: npm install @cucumber/cucumber

      - name: Run BDD Tests
        run: npx cucumber run tests/bdd/*.feature

  vitest-tests:
    name: Vitest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install vitest @vitest/coverage-v8

      - name: Run Vitest
        run: npx vitest run --reporter=json

  playwright-tests:
    name: Playwright Visual Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: npm install @playwright/test && npx playwright install --with-deps

      - name: Run Playwright Visual Tests
        run: npx playwright test

  spec-traceability:
    name: FR Traceability Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check FR References
        run: |
          echo "Validating FR-XXX-NNN traceability in tests"
          grep -r "FR-" tests/ 2>/dev/null | head -10 || echo "No FR references"
