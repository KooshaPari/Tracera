# Pre-commit hooks configuration
# Install: pre-commit install
# Run manually: pre-commit run --all-files
# Update: pre-commit autoupdate

repos:
  # Ruff - Linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # MyPy - Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.0
    hooks:
      - id: mypy
        args: [--strict, src/]
        additional_dependencies:
          - types-PyYAML
          - types-requests
          - pydantic

  # basedpyright - Ultra-strict type checking
  - repo: https://github.com/detachhead/basedpyright
    rev: v1.1.0
    hooks:
      - id: basedpyright

  # Tach - Architecture / dependency boundaries (https://github.com/tach-org/tach)
  - repo: local
    hooks:
      - id: tach-check
        name: tach check (Python module boundaries)
        entry: tach check
        language: system
        pass_filenames: false
        files: ^(src/|tach\.toml)

  # Bandit - Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: [-c, .bandit]
        exclude: ^tests/

  # Semgrep - use system binary (brew install semgrep); do not use the Python module
  # Community preset p/security-audit + project rules from .semgrep.yml
  - repo: local
    hooks:
      - id: semgrep
        name: semgrep
        entry: semgrep --config=p/security-audit --config=.semgrep.yml
        language: system
        pass_filenames: false

  # Trailing whitespace
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending

  # Docstring coverage
  - repo: https://github.com/econchick/interrogate
    rev: 1.5.0
    hooks:
      - id: interrogate
        args: [-vv, --fail-under=80, src/]

  # Unused imports and variables
  - repo: https://github.com/hadialqattan/pycln
    rev: v2.2.2
    hooks:
      - id: pycln
        args: [--all]

  # YAML formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [yaml, json, markdown]

  # Go - format and lint (requires: go, golangci-lint)
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt (backend)
        entry: gofmt -s -w
        language: system
        types: [go]
        files: ^backend/

      - id: golangci-lint
        name: golangci-lint (backend)
        entry: bash -c 'cd backend && golangci-lint run --fix'
        language: system
        pass_filenames: false
        files: ^backend/.*\.go$

  # Frontend - Biome (lint + format)
  - repo: local
    hooks:
      - id: biome-frontend
        name: biome (frontend)
        entry: bash -c 'cd frontend && bun run check:fix'
        language: system
        pass_filenames: false
        files: ^frontend/.*\.(js|ts|tsx|jsx|json|mjs|cjs)$

# Global settings
default_language_version:
  python: python3.12

# Exclude patterns
exclude: |
  (?x)^(
    \.venv/|
    venv/|
    __pycache__/|
    \.pytest_cache/|
    \.mypy_cache/|
    \.git/|
    build/|
    dist/|
    \.egg-info/
  )

# Fail fast on first error
fail_fast: false

# Minimum Python version
minimum_pre_commit_version: 2.15.0

