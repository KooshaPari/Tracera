# Comprehensive Go linting – revive comparison + awesome-go-linters
# Run: cd backend && golangci-lint run
# Format: cd backend && gofumpt -w .

version: 2

run:
  timeout: 5m
  modules-download-mode: readonly
  build-tags: []

linters:
  enable:
    # Defaults (correctness + unused)
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Style / patterns (revive = golint replacement)
    - revive
    # Extra style/bugs/performance
    - gocritic
    # Security
    - gosec
    # HTTP/DB correctness
    - bodyclose
    - rowserrcheck
    # Complexity
    - gocyclo
    - gocognit
    # Naming / style
    - misspell
    - unconvert
    # Exhaustiveness / correctness
    - exhaustive
    # Performance
    - prealloc
    # More style
    - whitespace
    - nakedret
    - noctx
    # AI coding hardening - Phase 1
    - dupl              # Duplicate code detection
    - goconst           # Repeated strings → constants
    - funlen            # Function length limits
    - mnd               # Magic number detection
    - nolintlint        # Validate //nolint usage
    - gochecknoglobals  # No global variables
    - perfsprint        # Performance optimization
  disable:
    - exhaustruct      # optional; enable if you want all struct fields init

formatters:
  enable:
    - gofmt

linters-settings:
  revive:
    severity: warning
    confidence: 0.8
    rules:
      - name: var-naming
      - name: package-comments
      - name: exported
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: context-as-argument
      - name: cyclomatic
        arguments: [10]
      - name: line-length-limit
        arguments: [120]
  gocyclo:
    min-complexity: 10  # Down from 15
  gocognit:
    min-complexity: 12  # Down from 20
  funlen:
    lines: 80
    statements: 50
  mnd:
    checks:
      - argument
      - case
      - condition
      - operation
      - return
      - assign
  gosec:
    excludes:
      - G104  # audit errors not checked (errcheck covers)
  errcheck:
    check-type-assertions: true
    check-blank: true
  exhaustive:
    default-signifies-exhaustive: false
  nakedret:
    max-func-lines: 5

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gocognit
        - gocyclo
        - funlen
    - path: \.pb\.go$
      linters: [all]
    - path: /vendor/
      linters: [all]
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  uniq-by-line: true
  sort-results: true
