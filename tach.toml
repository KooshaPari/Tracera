# Tach Configuration - Architecture Enforcement
# https://github.com/tach-org/tach | https://docs.gauge.sh

source_roots = ["src"]

exclude = [
  "**/__pycache__",
  "**/.pytest_cache",
  "**/.venv",
  "**/venv",
  "**/*.egg-info",
  "**/tests",
  "build",
  "dist",
  "docs",
]

# Strict: fail if declared deps are unused; fail on cycles
exact = true
forbid_circular_dependencies = true
# Uncontained code: "ignore" (default) | "allow" | "dependenciesonly" | "forbid"
root_module = "ignore"

[rules]
unused_ignore_directives = "error"
require_ignore_directive_reasons = "error"

[[modules]]
path = "tracertm.config"
depends_on = ["tracertm.core"]

[[modules]]
path = "tracertm.models"
depends_on = ["tracertm.core"]

[[modules]]
path = "tracertm.services"
depends_on = [
    "tracertm.config",
    "tracertm.models",
    "tracertm.database",
    "tracertm.core"
]

[[modules]]
path = "tracertm.cli"
depends_on = [
    "tracertm.config",
    "tracertm.models",
    "tracertm.services",
    "tracertm.core",
    "tracertm.database"
]

[[modules]]
path = "tracertm.database"
depends_on = [
    "tracertm.config",
    "tracertm.models",
    "tracertm.core"
]

[[modules]]
path = "tracertm.core"
depends_on = ["tracertm.models"]