apiVersion: 1

datasources:
  - name: Tempo
    uid: shared-traces
    type: tempo
    access: proxy
    url: http://localhost:3200
    isDefault: false
    editable: true
    jsonData:
      httpMethod: GET
      tracesToLogsV2:
        datasourceUid: Loki
        filterByTraceID: true
        filterBySpanID: false
      serviceMap:
        datasourceUid: Prometheus
