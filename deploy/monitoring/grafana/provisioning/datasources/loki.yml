apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://localhost:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        # Extract trace ID from logs for correlation with the shared trace UI
        - matcherRegex: "trace_id[=:]\\s*([a-f0-9]+)"
          datasourceUid: shared-traces
          name: TraceID
          url: '$${__value.raw}'
          urlDisplayLabel: View Trace
