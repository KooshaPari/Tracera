# git-cliff ~ default configuration file
# https://github.com/orhun/git-cliff/blob/main/cliff.toml

[changelog]
# changelog header
header = """
# Changelog

All notable changes to this project will be documented in this file.\n
"""
# template for the changelog body
body = """
{% if version %}\
    ## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper }}
    {% for commit in commits %}
        - {% if commit.breaking %}💥 {% endif %}{{ commit.message | upper_first }} (`{{ commit.id | truncate(length=7, end="") }}`)
    {%- endfor %}
{% endfor %}\n
"""
# remove the leading and trailing whitespace from the template
trim = true

[git]
# parse the commits based on https://www.conventionalcommits.org
conventional_commits = true
# filter out the commits that are not conventional
filter_unconventional = true
# split commits lines into multiple commits if the commit message has a footer
split_commits = false
# filter commits by commit type
commit_type = ["feat", "fix", "perf", "refactor", "docs", "style", "test", "chore", "ci"]
# protect breaking changes from being skipped due to matching a skipped type
protect_breaking_commits = false
