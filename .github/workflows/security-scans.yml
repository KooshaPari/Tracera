# Security Scanning Workflow

name: Security Scans

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday
  workflow_dispatch:

jobs:
  # Run on every push/PR
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # npm audit for frontend (gates on high+critical only)
      - name: Run npm audit
        run: |
          if [ -f package.json ]; then
            npm audit --audit-level=high --json > npm-audit.json
          else
            echo '{"metadata":{"vulnerabilities":{"high":0,"critical":0}}}' > npm-audit.json
          fi

      # pip-audit for Python (gates on any detected vulnerabilities)
      - name: Run pip-audit
        run: |
          if [ -f pyproject.toml ] || [ -f requirements.txt ] || [ -f requirements-dev.txt ]; then
            pip install pip-audit
            pip-audit --format=json > pip-audit.json
          else
            echo '{"dependencies":[],"vulnerabilities":[]}' > pip-audit.json
          fi

      # Trivy for container/vulnerability scanning
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'json'
          output: 'trivy.json'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          exit-code: '1'

      # Upload security reports
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            npm-audit.json
            pip-audit.json
            trivy.json

      # Create GitHub Security Advisory
      - name: Check for critical vulnerabilities
        run: |
          set -euo pipefail
          echo "=== Security Scan Summary ==="
          echo "Review security reports at: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # Check npm audit results
          if [ -f npm-audit.json ]; then
            CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' npm-audit.json)
            HIGH=$(jq '.metadata.vulnerabilities.high // 0' npm-audit.json)
            echo "npm high: $HIGH"
            echo "npm critical: $CRITICAL"
            if [ "$CRITICAL" -gt 0 ]; then
              echo "::error::npm: $CRITICAL critical vulnerabilities found"
              exit 1
            fi
            if [ "$HIGH" -gt 0 ]; then
              echo "::error::npm: $HIGH high vulnerabilities found"
              exit 1
            fi
          fi

  # Daily vulnerability check
  daily-vuln-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Check for new vulnerabilities
        run: |
          echo "Checking for new CVEs..."
          
          # This creates a GitHub issue for new vulnerabilities
          gh issue create \
            --title "Weekly Security Scan - $(date +%Y-%m-%d)" \
            --body "Automated security scan completed. Check Dependabot alerts and security reports." \
            --label "security,automated" || echo "Issue creation skipped"

  # CodeQL Analysis
  codeql:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, python, go
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript,python,go"

  # Dependency review (blocks risky PRs)
  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-fail
          approve-licenses: false
