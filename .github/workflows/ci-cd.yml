name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - id: filter
      shell: bash
      run: |
        set -euo pipefail
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          base="${{ github.event.pull_request.base.sha }}"
        else
          base="${{ github.event.before }}"
        fi
        changed="$(git diff --name-only "$base"...HEAD || true)"
        code_changed="$(echo "$changed" | grep -Ev '^(tests/contracts/|frontend/apps/web/vitest\.contract\.config\.ts$)' || true)"
        if echo "$code_changed" | grep -Eq '^(src/|tests/|backend/|frontend/|requirements|pyproject.toml|uv.lock|go.mod|go.sum|Dockerfile|docker-compose)'; then
          echo "code=true" >> "$GITHUB_OUTPUT"
        else
          echo "code=false" >> "$GITHUB_OUTPUT"
        fi

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: tracertm_test
          POSTGRES_USER: tracertm
          POSTGRES_PASSWORD: tracertm_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov
    
    - name: Run tests
      env:
        DATABASE_URL: postgresql://tracertm:tracertm_password@localhost:5432/tracertm_test
      run: |
        pytest tests/ -v --cov=src/tracertm --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff ty
    
    - name: Ruff format check
      run: ruff format --check .

    - name: Ruff lint
      # Use grouped output format for file-based processing (easier for agents to fix)
      run: ruff check . --output-format=grouped

    - name: Type check (ty)
      run: ty check src/ --error-on-warning

  build:
    needs: [test, lint]
    if: needs.test.result == 'success' && needs.lint.result == 'success'
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: tracertm:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to production
      run: |
        echo "Deploying to production..."
        # Add deployment commands here
