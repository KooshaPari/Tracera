name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend Tests (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.7'

      - name: Install dependencies
        run: |
          cd backend
          go mod download

      - name: Run tests
        run: |
          cd backend/tests
          go test -v -race -coverprofile=coverage.out ./...

      - name: Generate coverage report
        run: |
          cd backend/tests
          go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/tests/coverage.out
          flags: backend
          name: backend-coverage

  cli-tests:
    name: CLI Tests (Python)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Check CLI package exists
        id: cli
        shell: bash
        run: |
          if [ -f cli/pyproject.toml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No cli/ package found; skipping CLI tests."
          fi

      - name: Set up Python ${{ matrix.python-version }}
        if: steps.cli.outputs.exists == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        if: steps.cli.outputs.exists == 'true'
        run: |
          cd cli
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        if: steps.cli.outputs.exists == 'true'
        run: |
          cd cli
          pytest

      - name: Upload coverage
        if: steps.cli.outputs.exists == 'true'
        uses: codecov/codecov-action@v3
        with:
          files: ./cli/coverage.xml
          flags: cli
          name: cli-coverage-${{ matrix.python-version }}

  frontend-tests:
    name: Frontend Tests (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Run tests
        working-directory: frontend/apps/web
        run: bun run test

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/apps/web/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start services
        run: |
          docker-compose up -d
          sleep 10

      - name: Run integration tests
        run: |
          # Add integration test commands here
          echo "Integration tests would run here"

      - name: Stop services
        if: always()
        run: docker-compose down
