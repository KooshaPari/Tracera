name: Compose Build and Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build images
        run: |
          docker compose build
      - name: Start stack
        env:
          GITHUB_CLIENT_ID: dummy
          GITHUB_CLIENT_SECRET: dummy
          GITHUB_JWT_SECRET: test-secret
          GITHUB_REDIRECT_URI: http://localhost:8080/mcp/auth/github/callback
        run: |
          docker compose up -d
          docker compose ps
      - name: Wait for MCP health
        run: |
          for i in {1..30}; do \
            curl -fsS http://localhost:8080/healthz && exit 0 || true; \
            sleep 2; \
          done; \
          echo "MCP failed health"; docker compose logs zen-mcp; exit 1
      - name: Validate OAuth setup
        run: |
          python -m pip install aiohttp
          VALIDATOR_BASE_URL=http://localhost:8080 VALIDATOR_MCP_BASE=/mcp python tools/startup_validator.py
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Shutdown
        if: always()
        run: docker compose down -v --remove-orphans
