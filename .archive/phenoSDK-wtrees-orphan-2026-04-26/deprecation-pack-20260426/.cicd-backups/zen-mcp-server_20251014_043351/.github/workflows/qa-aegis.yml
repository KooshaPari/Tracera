name: QA Ingestion (Aegis)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'providers/aegis.py'
      - 'archive/**/integrations/langgraph_wrapper.py'
      - 'tests/aegis_langgraph/**'
      - 'scripts/qa_ingest.py'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'providers/aegis.py'
      - 'archive/**/integrations/langgraph_wrapper.py'
      - 'tests/aegis_langgraph/**'
      - 'scripts/qa_ingest.py'

jobs:
  qa-aegis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-langgraph.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          # LangGraph optional; tests avoid real runtime but install if available
          if [ -f requirements-langgraph.txt ]; then pip install -r requirements-langgraph.txt || true; fi

      - name: Run Aegis tests (JUnit)
        run: |
          mkdir -p reports
          pytest -q tests/aegis_langgraph -k "not slow" \
            --junitxml=reports/aegis-junit.xml || true

      - name: Ingest QA results (Aegis)
        run: |
          python scripts/qa_ingest.py \
            --project Aegis \
            --framework pytest \
            --input reports/aegis-junit.xml \
            --format junit \
            --commit "${{ github.sha }}" \
            --branch "${{ github.ref_name }}" \
            --ci github

      - name: Upload QA DB
        uses: actions/upload-artifact@v4
        with:
          name: qa-db-${{ github.sha }}
          path: dashboard/qa_data/qa.db
          if-no-files-found: warn
