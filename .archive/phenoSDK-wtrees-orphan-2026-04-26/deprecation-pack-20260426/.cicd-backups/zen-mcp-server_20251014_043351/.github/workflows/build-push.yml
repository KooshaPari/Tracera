name: Build and Push Images

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_MCP: ${{ github.repository }}-mcp
  IMAGE_DASH: ${{ github.repository }}-dashboard

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push MCP image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.mcp
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_MCP }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_MCP }}:${{ github.sha }}

      - name: Build & push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/dashboard
          file: ./apps/dashboard/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_DASH }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_DASH }}:${{ github.sha }}
