name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]

env:
  PYTHON_VERSION: "3.10"

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Enforce pheno-sdk dependency policy
      run: |
        set -euo pipefail
        if [ -d "pheno_vendor" ]; then
          echo "::error::pheno_vendor/ directory found. Vendoring is deprecated; use sibling ../pheno-sdk direct integration."
          exit 1
        fi
        # Fail if 'pheno-vendor' invocations exist in non-doc files
        MATCHES=$(grep -R -nE '(^|[^A-Za-z0-9_-])pheno-vendor([[:space:]]|$)' . \
          --exclude-dir=docs --exclude-dir=docs/archive --exclude-dir=.git --exclude='*.md' || true)
        if [ -n "$MATCHES" ]; then
          echo "::group::pheno-vendor usage detected"
          echo "$MATCHES"
          echo "::endgroup::"
          echo "::error::Found pheno-vendor usage in repository (non-doc). Remove any vendoring calls; direct ../pheno-sdk integration is the default."
          exit 1
        fi

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,test]"

    - name: Lint with ruff
      run: ruff check .

    - name: Check formatting with black
      run: black --check .

    - name: Check import sorting with isort
      run: isort --check-only .

    - name: Type check with mypy
      run: mypy .
      continue-on-error: true  # Allow mypy failures for now

    - name: Security check with bandit
      run: |
        pip install bandit[toml]
        bandit -r . -f json -o bandit-report.json || true
        bandit -r . || true
      continue-on-error: true

    - name: Run tests
      run: |
        pytest --cov --cov-report=xml --cov-report=term-missing --junitxml=test-results.xml

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.10'
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          test-results.xml
          htmlcov/
          bandit-report.json

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Check package
      run: twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: dist
        path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' && github.event.action == 'published'
    environment: release

    permissions:
      id-token: write  # For trusted publishing

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v3
      with:
        name: dist
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://upload.pypi.org/legacy/  # Remove this line for TestPyPI
