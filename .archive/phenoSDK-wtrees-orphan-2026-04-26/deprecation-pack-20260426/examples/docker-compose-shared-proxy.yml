# Docker Compose example for shared proxy + multiple services
# This demonstrates Phase 4: Reverse Proxy & Fallback Experience

version: '3.8'

services:
  # Shared reverse proxy
  proxy:
    image: nginx:alpine
    ports:
      - "9100:80"
      - "9000:9000"  # Fallback server
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./fallback-templates:/usr/share/nginx/html/templates:ro
    environment:
      - PROXY_PORT=80
      - FALLBACK_PORT=9000
    networks:
      - kinfra-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Project A - API Service
  api-service:
    build:
      context: ./api-service
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - PROJECT_NAME=api-service
      - SERVICE_PORT=8000
      - HEALTH_CHECK_PATH=/health
    networks:
      - kinfra-network
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Project B - Web Service
  web-service:
    build:
      context: ./web-service
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    environment:
      - PROJECT_NAME=web-service
      - SERVICE_PORT=8000
      - HEALTH_CHECK_PATH=/health
    networks:
      - kinfra-network
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Project C - Worker Service
  worker-service:
    build:
      context: ./worker-service
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    environment:
      - PROJECT_NAME=worker-service
      - SERVICE_PORT=8000
      - HEALTH_CHECK_PATH=/health
    networks:
      - kinfra-network
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Shared Redis (Global Resource)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=secret
    networks:
      - kinfra-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Shared PostgreSQL (Global Resource)
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=kinfra
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kinfra-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d kinfra"]
      interval: 30s
      timeout: 10s
      retries: 3

  # KInfra Health Dashboard
  health-dashboard:
    build:
      context: ./health-dashboard
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DASHBOARD_PORT=8080
      - PROXY_URL=http://proxy:80
    networks:
      - kinfra-network
    depends_on:
      - proxy
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  kinfra-network:
    driver: bridge