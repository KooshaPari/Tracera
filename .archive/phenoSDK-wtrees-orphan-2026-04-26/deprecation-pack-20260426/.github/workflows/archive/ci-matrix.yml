name: Reusable CI Matrix

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to install (e.g. 3.12)
        required: true
        type: string
      os:
        description: GitHub runner label (e.g. ubuntu-latest)
        required: true
        type: string

jobs:
  tests:
    name: Py${{ inputs.python-version }} • ${{ inputs.os }}
    runs-on: ${{ inputs.os }}

    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      PYTHONPATH: .:zen-mcp-server:zen-mcp-server/src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install base dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,quality]"

      - name: Run unit tests
        shell: bash
        run: |
          python scripts/cleanup_workspace.py --verbose
          pytest -c pytest.ini
