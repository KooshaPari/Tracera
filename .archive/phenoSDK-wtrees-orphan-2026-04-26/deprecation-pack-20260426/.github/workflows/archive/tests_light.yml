name: Tests (Light)

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  tests_light:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest fastapi starlette

      - name: Clean workspace artifacts
        run: |
          python scripts/cleanup_workspace.py --verbose

      - name: Run light tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
          PYTHONPATH: .:zen-mcp-server:zen-mcp-server/src
        run: |
          pytest -q -c /dev/null zen-mcp-server/tests_light
