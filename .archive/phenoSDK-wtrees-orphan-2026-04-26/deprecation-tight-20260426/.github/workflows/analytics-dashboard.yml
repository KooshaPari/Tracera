  # ==========================================================================
  # Phase 6: Notification and Alerting
  # ==========================================================================

  notification:
    name: "6. Analytics Notifications and Alerts"
    runs-on: ubuntu-latest
    needs: reporting
    if: always()
    steps:
      - name: Check for quality alerts
        run: |
          python -c "
          import json
          from datetime import datetime
          
          alert_level = 'none'
          alert_message = ''
          
          try:
            with open('all-artifacts/quality-metrics.json', 'r') as f:
              metrics = json.load(f)
            
            overall_health = metrics.get('overall_health', {})
            workflow_metrics = metrics.get('workflow_metrics', {})
            doc_metrics = metrics.get('documentation_metrics', {})
            
            # Check for critical alerts
            if overall_health.get('score', 100) < 40:
              alert_level = 'critical'
              alert_message = f'CRITICAL: Overall quality score is critically low ({overall_health.get(\"score\", 0)}/100)'
            elif overall_health.get('score', 100) < 60:
              alert_level = 'warning'
              alert_message = f'WARNING: Quality score below threshold ({overall_health.get(\"score\", 0)}/100)'
            elif workflow_metrics.get('successful_runs', 0) / max(workflow_metrics.get('total_runs', 1), 1) < 0.5:
              alert_level = 'warning'
              alert_message = f'WARNING: Low workflow success rate ({workflow_metrics.get(\"successful_runs\", 0)}/{workflow_metrics.get(\"total_runs\", 0)})'
            elif not doc_metrics.get('has_readme', False) and not doc_metrics.get('has_changelog', False):
              alert_level = 'info'
              alert_message = 'INFO: Missing fundamental documentation (README and CHANGELOG)'
            else:
              alert_level = 'info'
              alert_message = 'Info: Quality metrics within acceptable ranges'
            
            # Create alert summary
            alert_summary = {
              'alert_level': alert_level,
              'alert_message': alert_message,
              'timestamp': datetime.now().isoformat(),
              'overall_score': overall_health.get('score', 0),
              'grade': overall_health.get('grade', 'N/A'),
              'workflow_success': (workflow_metrics.get('successful_runs', 0) / max(workflow_metrics.get('total_runs', 1), 1)) * 100,
              'documentation_quality': 100 if doc_metrics.get('has_readme', False) and doc_metrics.get('has_changelog', False) else 0,
            }
            
            with open('alert-summary.json', 'w') as f:
              json.dump(alert_summary, f, indent=2)
            
            print(f'Alert Level: {alert_level.upper()}')
            print(f'Alert Message: {alert_message}')
            print(f'Overall Score: {alert_summary[\"overall_score\"]}/100')
            
          except Exception as e:
            print(f'Error generating alerts: {e}')
            alert_summary = {'error': str(e)}
            with open('alert-summary.json', 'w') as f:
              json.dump(alert_summary, f, indent=2)
          "

      - name: Create alert badge (if needed)
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            try {
              const alertSummary = JSON.parse(fs.readFileSync('alert-summary.json', 'utf8'));
              
              if (alertSummary.alert_level && alertSummary.alert_level !== 'none') {
                const badgeColor = alertSummary.alert_level === 'critical' ? 'red' : alertSummary.alert_level === 'warning' ? 'orange' : 'blue';
                const badgeUrl = `https://img.shields.io/badge/Quality-${encodeURIComponent(alertSummary.alert_message.replace(/[^a-zA-Z0-9\s]/g, ''))}-${badgeColor}`;
                console.log(`Badge URL: ${badgeUrl}`);
                
                // This would typically create a badge file or update README
                const badgeMarkdown = `[![Quality](${badgeUrl})](./actions/runs/${context.runId})`;
                console.log(`Markdown: ${badgeMarkdown}`);
              }
              
            } catch (error) {
              console.error('Error creating badge:', error);
            }

      - name: Upload alert summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analytics-alerts
          path: |
            alert-summary.json
          retention-days: 30

