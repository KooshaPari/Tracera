              'grade': overall_health.get('grade', 'N/A'),
              'alert_level': alerts.get('alert_level', 'none'),
              'workflow_success': (workflow_metrics.get('successful_runs', 0) / max(workflow_metrics.get('total_runs', 1), 1)) * 100,
            }
          }
          
          with open('analytics-final-status.json', 'w') as f:
            json.dump(status_summary, f, indent=2, default=str)
          "

      - name: Upload final status
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analytics-final-status
          path: |
            analytics-final-status.json
            final-status-summary.txt
          retention-days: 7
