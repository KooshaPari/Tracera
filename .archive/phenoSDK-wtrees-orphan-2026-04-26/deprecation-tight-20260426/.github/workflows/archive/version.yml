name: Version packages (semantic-release)

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  id-token: write

jobs:
  version:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - pydevkit
          - workflow-kit
          - db-kit
          - deploy-kit
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v3
      - name: Install semantic-release
        run: |
          uv pip install --system python-semantic-release
      - name: Run semantic-release (version only)
        working-directory: packages/${{ matrix.package }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          semantic-release version --noop false
