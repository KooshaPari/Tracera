# Security Policy Configuration
# This file defines security policies and compliance requirements

security_policies:
  # Password and Authentication Policies
  password_policies:
    min_length: 12
    require_uppercase: true
    require_lowercase: true
    require_numbers: true
    require_special: true
    forbidden_patterns:
      - "password"
      - "123456"
      - "admin"
      - "root"
      - "test"
    max_age_days: 90
    history_count: 5

  # API Security Policies
  api_security:
    require_https: true
    require_authentication: true
    forbidden_headers:
      - "X-Forwarded-For"
      - "X-Real-IP"
      - "X-Original-URL"
    required_headers:
      - "Authorization"
      - "Content-Type"
    rate_limiting:
      enabled: true
      requests_per_minute: 100
    cors_policy:
      allowed_origins: ["https://yourdomain.com"]
      allowed_methods: ["GET", "POST", "PUT", "DELETE"]
      allowed_headers: ["Authorization", "Content-Type"]

  # Data Protection Policies
  data_protection:
    encrypt_sensitive_data: true
    no_hardcoded_secrets: true
    pii_detection: true
    data_retention: true
    encryption_algorithm: "AES-256-GCM"
    pii_patterns:
      email: '\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b'
      ssn: '\b\d{3}-\d{2}-\d{4}\b'
      credit_card: '\b\d{4}[-\s]?\d{4}[-\s]?\d{4}[-\s]?\d{4}\b'
      phone: '\b\d{3}[-.]?\d{3}[-.]?\d{4}\b'
    data_classification:
      public: ["README.md", "LICENSE"]
      internal: ["docs/", "tests/"]
      confidential: ["src/", "config/"]
      restricted: ["secrets/", "keys/"]

  # Code Security Policies
  code_security:
    no_eval: true
    no_exec: true
    no_shell_injection: true
    no_sql_injection: true
    input_validation: true
    dangerous_functions:
      - "eval"
      - "exec"
      - "compile"
      - "globals"
      - "locals"
    dangerous_modules:
      - "os.system"
      - "subprocess.call"
      - "subprocess.run"
    sql_injection_patterns:
      - "execute.*%s"
      - "execute.*%d"
      - "execute.*%f"

  # Dependency Security Policies
  dependency_security:
    vulnerability_scan: true
    license_compliance: true
    outdated_packages: true
    malicious_packages: true
    allowed_licenses:
      - "MIT"
      - "Apache-2.0"
      - "BSD-3-Clause"
      - "BSD-2-Clause"
    forbidden_licenses:
      - "GPL-3.0"
      - "AGPL-3.0"
    max_age_days: 365
    security_advisories: true

  # Infrastructure Security Policies
  infrastructure_security:
    container_scanning: true
    image_vulnerability_scan: true
    network_policies: true
    resource_limits: true
    security_context: true
    non_root_user: true
    read_only_filesystem: true
    no_privileged_containers: true

  # Monitoring and Alerting
  monitoring:
    security_events: true
    failed_logins: true
    privilege_escalation: true
    data_exfiltration: true
    anomaly_detection: true
    alert_channels:
      - "email"
      - "slack"
      - "webhook"
    severity_levels:
      critical: ["data_breach", "privilege_escalation"]
      high: ["failed_auth", "suspicious_activity"]
      medium: ["policy_violation", "outdated_deps"]
      low: ["info", "debug"]

# Compliance Standards
compliance:
  standards:
    - "SOC2"
    - "ISO27001"
    - "GDPR"
    - "HIPAA"
    - "PCI-DSS"
  
  requirements:
    data_encryption: true
    access_control: true
    audit_logging: true
    incident_response: true
    vulnerability_management: true
    security_training: true

# Security Tools Configuration
security_tools:
  static_analysis:
    bandit:
      enabled: true
      severity: "medium"
      confidence: "medium"
    semgrep:
      enabled: true
      rules: ["security", "python"]
    safety:
      enabled: true
      check_live: true
  
  dynamic_analysis:
    dependency_check:
      enabled: true
      check_live: true
    license_check:
      enabled: true
      fail_on_forbidden: true
  
  container_security:
    trivy:
      enabled: true
      severity: "HIGH,CRITICAL"
    docker_bench:
      enabled: true

# Security Incident Response
incident_response:
  playbooks:
    data_breach:
      - "Isolate affected systems"
      - "Notify security team"
      - "Document incident"
      - "Notify stakeholders"
      - "Implement remediation"
    
    vulnerability_disclosure:
      - "Assess vulnerability"
      - "Develop patch"
      - "Test patch"
      - "Deploy patch"
      - "Notify users"
  
  contacts:
    security_team: "security@company.com"
    legal_team: "legal@company.com"
    pr_team: "pr@company.com"
  
  escalation:
    level_1: "security_team"
    level_2: "cto"
    level_3: "ceo"

# Security Metrics and KPIs
metrics:
  security_score:
    weight_violations: 0.4
    weight_vulnerabilities: 0.3
    weight_compliance: 0.2
    weight_training: 0.1
  
  thresholds:
    critical_score: 60
    warning_score: 80
    target_score: 90
  
  reporting:
    frequency: "weekly"
    format: ["json", "html", "pdf"]
    recipients: ["security_team", "management"]