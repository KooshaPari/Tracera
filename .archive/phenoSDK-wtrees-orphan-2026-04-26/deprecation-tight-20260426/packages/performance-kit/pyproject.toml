[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "performance-kit"
version = "0.1.0"
description = "Performance monitoring and analysis framework for pheno-sdk ecosystem"
requires-python = ">=3.11"
readme = "README.md"
license = { text = "Proprietary" }
authors = [{ name = "PHENO-SDK Team" }]

[project.optional-dependencies]
# Core Performance Dependencies
core = [
    "pytest-benchmark>=4.0.0",
    "locust>=2.17.0",
    "memory-profiler>=0.61.0",
    "psutil>=5.9.0",
    "py-spy>=0.3.14",
    "line-profiler>=4.1.1",
    "fil-profile>=0.9.0",
    "pyinstrument>=0.5.1",
]

# Analysis Dependencies
analysis = [
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "matplotlib>=3.7.0",
    "seaborn>=0.12.0",
    "plotly>=5.15.0",
]

# Monitoring Dependencies
monitoring = [
    "prometheus-client>=0.17.0",
    "statsd>=4.0.1",
    "datadog>=0.47.0",
    "sentry-sdk>=1.32.0",
]

# Testing Dependencies
testing = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "pytest-mock>=3.11.0",
    "pytest-cov>=4.1.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["performance_kit*"]

[tool.setuptools.package-data]
performance_kit = ["scripts/*.py", "configs/*.yaml", "monitors/*.py", "reports/*.html"]
