[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "config-kit"
version = "0.1.0"
description = "Centralized configuration management for pheno-sdk ecosystem"
requires-python = ">=3.11"
readme = "README.md"
license = { text = "Proprietary" }
authors = [{ name = "PHENO-SDK Team" }]

[project.optional-dependencies]
# Core Configuration Dependencies
core = [
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "pyyaml>=6.0",
    "toml>=0.10.0",
    "click>=8.1.0",
    "rich>=13.0.0",
]

# Pre-commit Dependencies
precommit = [
    "pre-commit>=3.0.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "mypy>=1.5.0",
    "ruff>=0.1.0",
    "bandit>=1.7.5",
]

# Testing Dependencies
testing = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.11.0",
    "coverage>=7.4.0",
]

# Linting Dependencies
linting = [
    "ruff>=0.1.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "mypy>=1.5.0",
    "bandit>=1.7.5",
    "prospector>=1.10.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["config_kit*"]

[tool.setuptools.package-data]
config_kit = [
    "pre-commit/*.yaml",
    "pytest/*.ini",
    "pytest/plugins/*.py",
    "pytest/fixtures/*.py",
    "pytest/data/*.py",
    "linting/*",
    "quality/*.yaml"
]
