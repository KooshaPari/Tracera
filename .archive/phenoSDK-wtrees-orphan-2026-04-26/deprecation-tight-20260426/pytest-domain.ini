[pytest]
minversion = 7.4
addopts =
    --strict-markers
    -m "integration or contract or api or db"
    --durations=0
    --color=yes
testpaths =
    test
norecursedirs =
    .git
    .venv
    htmlcov
filterwarnings =
    error
    ignore::UserWarning:asyncio
    ignore::DeprecationWarning
env =
    PYTHONPATH=.:zen-mcp-server:zen-mcp-server/src
