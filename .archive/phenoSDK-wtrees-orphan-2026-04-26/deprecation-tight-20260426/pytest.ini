[pytest]
minversion = 7.4
testpaths =
	test
norecursedirs =
	.git
	.venv
	htmlcov
python_files = test_*.py *_test.py
python_classes = Test* *Tests
python_functions = test_* *_test
markers =
	asyncio: Async test marker for pytest-asyncio.
	smoke: Critical path validation that should pass on every commit.
	regression: Comprehensive regression coverage.
	integration: Cross-module integration scenarios.
	unit: Isolated unit tests.
	e2e: End-to-end workflow tests.
	contract: Contract validation for external interfaces.
	cli: CLI behaviour validation.
	api: HTTP API level tests.
	db: Database interaction tests.
	auth: Authentication and authorization checks.
	analytics: Monitoring and analytics verification.
	load: High concurrency load scenarios.
	performance: Performance benchmarking and profiling.
	stress: Stress testing under extreme conditions.
	security: Security validation and hardening checks.
	migration: Schema/config migration validation.
	compatibility: Backwards/forwards compatibility coverage.
	flaky: Known flaky tests awaiting stabilization.
	slow: Slow-running tests (may be skipped locally).
	fast: Quick-running tests for rapid feedback.
	snapshots: Snapshot-based assertions.
	docs: Documentation or tutorial validation.
	experiments: Experimental tests not run in CI by default.
	requires_auth: Requires WorkOS authentication context.
	no_auth: Explicitly bypasses authentication layers.
filterwarnings =
	error
	ignore::DeprecationWarning:pkg_resources
	ignore::DeprecationWarning:asyncio
	ignore::DeprecationWarning:starlette.status
	ignore::UserWarning:pytest_cov
log_cli = true
log_cli_level = INFO
log_cli_date_format = %Y-%m-%d %H:%M:%S
log_cli_format = %(asctime)s [%(levelname)s] %(name)s - %(message)s
addopts =
    -q
    -p pheno.mcp.qa.pytest_plugins
    --maxfail=5
    --durations=10
    --durations-min=2.0
