name: Legacy Imports Guard

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  legacy-imports:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          # import-linter is optional; script will still enforce legacy guard
          pip install import-linter || true

      - name: Run legacy import guard
        run: |
          python scripts/ci_check_legacy_imports.py
          # Run import-linter if available
          if command -v import-linter >/dev/null 2>&1; then
            import-linter
          else
            echo "(import-linter not installed; skipping)"
          fi
