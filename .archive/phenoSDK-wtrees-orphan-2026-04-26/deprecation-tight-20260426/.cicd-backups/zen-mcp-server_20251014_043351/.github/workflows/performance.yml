name: Performance Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday

jobs:
  performance-tests:
    name: Performance & Load Tests
    runs-on: ubuntu-latest
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONPATH: .:src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,performance]"

      - name: Install performance tools
        run: |
          pip install locust memory-profiler psutil pytest-benchmark

      - name: Run performance benchmarks
        run: |
          pytest tests/performance/ -v --benchmark-only --benchmark-json=benchmark-results.json

      - name: Run load tests
        run: |
          if [ -d "tests/load" ]; then
            locust -f tests/load/locustfile.py --headless --users 10 --spawn-rate 2 --run-time 60s --host http://localhost:8000
          else
            echo "Load tests not configured, skipping..."
          fi

      - name: Run memory profiling
        run: |
          python scripts/profile_memory.py --imports --json > memory-profile.json

      - name: Upload performance artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-results
          path: |
            benchmark-results.json
            memory-profile.json
            locust-report.html

  atlas-monitoring:
    name: Atlas Monitoring
    runs-on: ubuntu-latest
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install monitoring dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[full]"

      - name: Run comprehensive monitoring workflow
        run: |
          make monitor-comprehensive

  performance-regression:
    name: Performance Regression Check
    runs-on: ubuntu-latest
    needs: performance-tests
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download performance artifacts
        uses: actions/download-artifact@v4
        with:
          name: performance-results

      - name: Check performance regression
        run: |
          if [ -f "benchmark-results.json" ]; then
            python scripts/check_performance_regression.py benchmark-results.json
          else
            echo "No benchmark results found"
          fi
