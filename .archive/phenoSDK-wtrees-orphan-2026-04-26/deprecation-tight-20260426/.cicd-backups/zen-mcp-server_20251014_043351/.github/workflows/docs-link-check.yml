name: Docs Link Check (non-blocking)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  link-check:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run internal docs link checker
        run: |
          python docs/_check_links.py || true

      - name: Summarize (soft-fail)
        run: echo "Docs link check completed (non-blocking). See job log for details."
