# Lychee link checker configuration
# Keep this conservative to avoid flakes in CI

# General
max_retries = 2
retry_wait = 2
timeout = 20
user_agent = "phenoSDK-lychee-ci"

# What to check
# Check markdown and HTML assets in the repo (the action will pass '.')
# We exclude common false-positives and local-only links
exclude = [
  "localhost",
  "127.0.0.1",
  "::1",
  "example.com",
  "mailto:",
  "^tel:",
]

# Accept common redirect codes
accept = [200, 201, 202, 204, 301, 302, 303, 307, 308]

# Don’t fail on timeouts (network flakes)
# lychee v0.15+ supports this via `fail = ["errors"]`
# Older versions will ignore unknown keys
fail = ["errors"]
