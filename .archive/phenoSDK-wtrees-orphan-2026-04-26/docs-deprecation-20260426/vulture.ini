[vulture]
# Vulture configuration for pheno-sdk
# Dead code detection with appropriate ignore patterns

# Minimum confidence level for reporting dead code (0-100)
min_confidence = 80

# Ignore patterns for files and directories
ignore_decorators =
    @property
    @staticmethod
    @classmethod
    @abstractmethod
    @cached_property
    @lru_cache
    @functools.lru_cache
    @pytest.fixture
    @pytest.mark.parametrize
    @click.command
    @click.option
    @click.argument
    @dataclass
    @pydantic.validator
    @pydantic.field_validator
    @pydantic.model_validator
    @pytest_asyncio.fixture
    @asyncio.coroutine
    @contextmanager
    @contextlib.contextmanager

# Ignore specific patterns in code
