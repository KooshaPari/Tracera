name: Python Coverage

on:
  workflow_call:
    inputs:
      python_version:
        description: 'Python version to use'
        required: false
        default: '3.11'
        type: string
      test_path:
        description: 'Path to test files'
        required: false
        default: 'tests'
        type: string
      test_markers:
        description: 'Test markers to run'
        required: false
        default: 'not integration'
        type: string
      coverage_threshold:
        description: 'Coverage threshold percentage'
        required: false
        default: '80'
        type: string
      requirements_files:
        description: 'Requirements files to install'
        required: false
        default: 'requirements.txt,requirements-dev.txt'
        type: string
    outputs:
      coverage_xml_path:
        description: 'Path to coverage XML file'
        value: ${{ steps.upload-coverage.outputs.artifact-path }}

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'
          cache-dependency-path: |
            ${{ inputs.requirements_files }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          IFS=',' read -ra FILES <<< "${{ inputs.requirements_files }}"
          for file in "${FILES[@]}"; do
            if [ -f "$file" ]; then
              pip install -r "$file"
            fi
          done
      - name: Run tests with coverage XML
        run: |
          pytest -q ${{ inputs.test_path }} -m "${{ inputs.test_markers }}" --cov=. --cov-report=xml:coverage.xml --cov-report=term
      - name: Check coverage threshold
        run: |
          coverage report --fail-under=${{ inputs.coverage_threshold }}
      - name: Upload coverage artifact
        id: upload-coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-coverage-xml
          path: coverage.xml
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: python
          fail_ci_if_error: false
