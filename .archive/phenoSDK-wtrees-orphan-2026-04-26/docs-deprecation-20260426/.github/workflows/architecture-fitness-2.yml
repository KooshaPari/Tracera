name: Architecture Fitness

on:
  push:
    branches: [main, develop, vecfin-latest]
  pull_request:
    branches: [main, develop, vecfin-latest]
  workflow_dispatch:

jobs:
  fitness:
    name: Architecture Guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHON_VERSION: "3.11"
      PYTEST_ADDOPTS: "-p no:cov -p no:pytest_benchmark"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio

      - name: Configure pheno-sdk deploy key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PHENO_SDK_DEPLOY_KEY }}" > ~/.ssh/privSSH
          chmod 600 ~/.ssh/privSSH

      - name: Install pheno-sdk package
        shell: bash
        env:
          PHENO_SDK_SSH_KEY: ~/.ssh/privSSH
          PHENO_SDK_REF: ${{ vars.PHENO_SDK_REF || 'main' }}
        run: scripts/install_pheno_sdk.sh --upgrade --no-deps

      - name: Prepare artifact directory
        run: mkdir -p architecture-results

      - name: File size report
        id: file_sizes
        run: |
          python scripts/check_file_sizes.py --report | tee architecture-results/file_sizes.txt
        continue-on-error: true

      - name: Import boundaries
        id: import_boundaries
        run: |
          pytest tests/architecture/test_import_boundaries.py -v --tb=short \
            | tee architecture-results/import_boundaries.txt
        continue-on-error: true

      - name: File size tests
        id: file_size_tests
        run: |
          pytest tests/architecture/test_file_sizes.py -v --tb=short -s \
            | tee architecture-results/file_size_tests.txt
        continue-on-error: true

      - name: Dependency direction
        id: dependency_direction
        run: |
          pytest tests/architecture/test_dependency_direction.py -v --tb=short \
            | tee architecture-results/dependency_direction.txt
        continue-on-error: true

      - name: Naming conventions
        id: naming_conventions
        run: |
          pytest tests/architecture/test_naming_conventions.py -v --tb=short \
            | tee architecture-results/naming_conventions.txt
        continue-on-error: true

      - name: Cyclomatic complexity
        id: cyclomatic_complexity
        run: |
          pytest tests/architecture/test_cyclomatic_complexity.py -v --tb=short \
            | tee architecture-results/cyclomatic_complexity.txt
        continue-on-error: true

      - name: Coverage guardrails
        id: coverage_guardrails
        run: |
          pytest tests/architecture/test_test_coverage.py -v --tb=short \
            | tee architecture-results/test_coverage.txt
        continue-on-error: true

      - name: Configuration validation
        id: validate_config
        run: |
          python scripts/validate_config.py --load-env --format text \
            | tee architecture-results/config_validation.txt
        continue-on-error: true

      - name: Summarise results
        if: always()
        run: |
          echo "## Architecture Fitness Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for report in architecture-results/*.txt; do
            section=$(basename "$report" .txt | tr '_' ' ' | sed 's/\b\(.\)/\u\1/g')
            echo "### ${section}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -n 40 "$report" >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done
          echo "_All steps use continue-on-error so failures surface here without blocking feature work._" >> $GITHUB_STEP_SUMMARY

      - name: Upload detailed logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-results
          path: architecture-results
          retention-days: 14
