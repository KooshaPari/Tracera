name: Performance Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[quality,test,performance]"

      - name: Download baseline benchmarks
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: performance-baseline
          path: baseline-performance

      - name: Run performance tests
        run: |
          mkdir -p reports/performance
          BASELINE_ARG=""
          if [ -f baseline-performance/benchmark.json ]; then
            echo "Using performance baseline for comparison"
            BASELINE_ARG="--benchmark-compare=baseline-performance/benchmark.json"
          fi
          pytest tests/performance --benchmark-only --benchmark-json=reports/performance/benchmark.json --benchmark-storage=file://reports/performance/benchmarks.sqlite ${BASELINE_ARG}

      - name: Upload performance reports
        uses: actions/upload-artifact@v4
        with:
          name: performance-reports
          path: reports/performance/

      - name: Publish new baseline (main)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: performance-baseline
          path: |
            reports/performance/benchmark.json
            reports/performance/benchmarks.sqlite
