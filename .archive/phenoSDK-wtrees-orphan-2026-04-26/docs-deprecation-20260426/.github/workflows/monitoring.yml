name: Monitoring & Analytics

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM

jobs:
  code-complexity:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Clean workspace artifacts
      run: |
        python scripts/cleanup_workspace.py --verbose

    - name: Run code complexity analysis
      run: |
        python scripts/analyze_complexity.py

  dead-code-detection:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Clean workspace artifacts
      run: |
        python scripts/cleanup_workspace.py --verbose

    - name: Run dead code detection
      run: |
        python scripts/detect_dead_code.py

  documentation-coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install monitoring tools
      run: |
        pip install radon xenon vulture interrogate

    - name: Clean workspace artifacts
      run: |
        python scripts/cleanup_workspace.py --verbose

  performance-monitoring:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Clean workspace artifacts
      run: |
        python scripts/cleanup_workspace.py --verbose

    - name: Run documentation coverage analysis
      run: |
        interrogate pheno-sdk

  dependency-analysis:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Clean workspace artifacts
      run: |
        python scripts/cleanup_workspace.py --verbose

    - name: Run dependency analysis
      run: |
        python scripts/analyze_dependencies.py

  atlas-monitoring:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install monitoring dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[quality,test]"

    - name: Run comprehensive monitoring workflow
      run: |
        make monitor-comprehensive

  deploy-readiness:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

  quality-report:
    runs-on: ubuntu-latest
    needs: [code-complexity, dead-code-detection, documentation-coverage, dependency-analysis, atlas-monitoring]
    steps:
    - uses: actions/checkout@v4

    - name: Generate comprehensive quality report
      run: |
        echo "ATOMS-PHENO Monitoring Dashboard" > monitoring-report.md
        echo "=====================" >> monitoring-report.md
        echo "" >> monitoring-report.md
        echo "Code Quality Metrics:" >> monitoring-report.md
        echo "- Cyclomatic Complexity" >> monitoring-report.md
        echo "- Maintainability Index" >> monitoring-report.md
        echo "" >> monitoring-report.md
        echo "$(date)" >> monitoring-report.md
