name: KInfra Phase 5 CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/pheno/infra/**'
      - 'tests/integration/**'
      - 'tests/smoke/**'
      - 'scripts/**'
      - 'examples/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/pheno/infra/**'
      - 'tests/integration/**'
      - 'tests/smoke/**'
      - 'scripts/**'
      - 'examples/**'

jobs:
  # Lint and check registry integrity
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,test]"
    
    - name: Run KInfra lint
      run: |
        python scripts/kinfra-lint.py --all --verbose
    
    - name: Run registry integrity check
      run: |
        python scripts/kinfra-lint.py --registry-check --metadata-check --verbose
    
    - name: Run code quality checks
      run: |
        make lint
        make type-check
        make security

  # Smoke tests for critical functionality
  smoke-tests:
    runs-on: ubuntu-latest
    needs: lint-and-check
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,test]"
    
    - name: Install Redis
      run: |
        sudo apt-get update
        sudo apt-get install -y redis-server
        sudo systemctl start redis-server
    
    - name: Install PostgreSQL
      run: |
        sudo apt-get install -y postgresql postgresql-contrib
        sudo systemctl start postgresql
        sudo -u postgres createdb test_db
    
    - name: Install NATS
      run: |
        wget https://github.com/nats-io/nats-server/releases/latest/download/nats-server-v2.9.0-linux-amd64.zip
        unzip nats-server-v2.9.0-linux-amd64.zip
        sudo mv nats-server /usr/local/bin/
        nats-server --port 4222 --daemon
    
    - name: Run smoke tests
      run: |
        python -m pytest tests/smoke/test_kinfra_smoke.py -v --tb=short
    
    - name: Run port allocation tests
      run: |
        python -m pytest tests/smoke/test_kinfra_smoke.py::TestPortAllocationSmoke -v
    
    - name: Run proxy mapping tests
      run: |
        python -m pytest tests/smoke/test_kinfra_smoke.py::TestProxyMappingSmoke -v
    
    - name: Run resource reuse tests
      run: |
        python -m pytest tests/smoke/test_kinfra_smoke.py::TestResourceReuseSmoke -v

  # Integration tests for Phase 5 features
  integration-tests:
    runs-on: ubuntu-latest
    needs: smoke-tests
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,test]"
    
    - name: Install Redis
      run: |
        sudo apt-get update
        sudo apt-get install -y redis-server
        sudo systemctl start redis-server
    
    - name: Install PostgreSQL
      run: |
        sudo apt-get install -y postgresql postgresql-contrib
        sudo systemctl start postgresql
        sudo -u postgres createdb test_db
    
    - name: Install NATS
      run: |
        wget https://github.com/nats-io/nats-server/releases/latest/download/nats-server-v2.9.0-linux-amd64.zip
        unzip nats-server-v2.9.0-linux-amd64.zip
        sudo mv nats-server /usr/local/bin/
        nats-server --port 4222 --daemon
    
    - name: Run integration tests
      run: |
        python -m pytest tests/integration/test_phase5_integration.py -v --tb=short
    
    - name: Run multi-project process governance tests
      run: |
        python -m pytest tests/integration/test_phase5_integration.py::TestMultiProjectProcessGovernance -v
    
    - name: Run shared resource coordination tests
      run: |
        python -m pytest tests/integration/test_phase5_integration.py::TestSharedResourceCoordination -v
    
    - name: Run tunnel lifecycle management tests
      run: |
        python -m pytest tests/integration/test_phase5_integration.py::TestTunnelLifecycleManagement -v
    
    - name: Run cleanup policy enforcement tests
      run: |
        python -m pytest tests/integration/test_phase5_integration.py::TestCleanupPolicyEnforcement -v
    
    - name: Run status monitoring tests
      run: |
        python -m pytest tests/integration/test_phase5_integration.py::TestStatusMonitoringAndDashboards -v

  # Process governance tests
  process-governance:
    runs-on: ubuntu-latest
    needs: smoke-tests
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,test]"
    
    - name: Test process registration
      run: |
        python -c "
        from pheno.infra.process_governance import ProcessGovernanceManager, ProcessMetadata
        manager = ProcessGovernanceManager()
        metadata = ProcessMetadata(
            project='test-project',
            service='test-service',
            pid=12345,
            command_line=['python', 'test.py'],
            environment={'TEST': 'true'},
            scope='local',
            resource_type='test',
            tags={'test'}
        )
        manager.register_process(12345, metadata)
        processes = manager.get_project_processes('test-project')
        assert len(processes) == 1
        print('Process registration test passed')
        "
    
    - name: Test process cleanup
      run: |
        python -c "
        from pheno.infra.process_governance import ProcessGovernanceManager, ProcessMetadata
        manager = ProcessGovernanceManager()
        metadata = ProcessMetadata(
            project='test-project',
            service='test-service',
            pid=12346,
            command_line=['python', 'test.py'],
            environment={'TEST': 'true'},
            scope='local',
            resource_type='test',
            tags={'test'}
        )
        manager.register_process(12346, metadata)
        stats = manager.cleanup_project_processes('test-project')
        assert stats['terminated'] == 1
        print('Process cleanup test passed')
        "
    
    - name: Test process statistics
      run: |
        python -c "
        from pheno.infra.process_governance import ProcessGovernanceManager
        manager = ProcessGovernanceManager()
        stats = manager.get_cleanup_stats()
        assert isinstance(stats, dict)
        print('Process statistics test passed')
        "

  # Tunnel governance tests
  tunnel-governance:
    runs-on: ubuntu-latest
    needs: smoke-tests
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,test]"
    
    - name: Test tunnel creation
      run: |
        python -c "
        from pheno.infra.tunnel_governance import TunnelGovernanceManager
        manager = TunnelGovernanceManager()
        tunnel = manager.create_tunnel(
            project='test-project',
            service='test-service',
            port=8000,
            provider='cloudflare',
            reuse_existing=False
        )
        assert tunnel is not None
        assert tunnel.project == 'test-project'
        print('Tunnel creation test passed')
        "
    
    - name: Test tunnel reuse
      run: |
        python -c "
        from pheno.infra.tunnel_governance import TunnelGovernanceManager
        manager = TunnelGovernanceManager()
        tunnel1 = manager.create_tunnel(
            project='test-project',
            service='test-service',
            port=8000,
            provider='cloudflare',
            reuse_existing=False
        )
        tunnel2 = manager.create_tunnel(
            project='test-project',
            service='test-service',
            port=8000,
            provider='cloudflare',
            reuse_existing=True
        )
        assert tunnel2.tunnel_id == tunnel1.tunnel_id
        print('Tunnel reuse test passed')
        "
    
    - name: Test tunnel cleanup
      run: |
        python -c "
        from pheno.infra.tunnel_governance import TunnelGovernanceManager
        manager = TunnelGovernanceManager()
        tunnel = manager.create_tunnel(
            project='test-project',
            service='test-service',
            port=8000,
            provider='cloudflare',
            reuse_existing=False
        )
        cleanup_count = manager.cleanup_project_tunnels('test-project')
        assert cleanup_count == 1
        print('Tunnel cleanup test passed')
        "

  # Cleanup policy tests
  cleanup-policies:
    runs-on: ubuntu-latest
    needs: smoke-tests
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,test]"
    
    - name: Test cleanup policy creation
      run: |
        python -c "
        from pheno.infra.cleanup_policies import CleanupPolicyManager, CleanupStrategy
        manager = CleanupPolicyManager()
        policy = manager.create_default_policy(
            project_name='test-project',
            strategy=CleanupStrategy.MODERATE
        )
        assert policy is not None
        assert policy.project_name == 'test-project'
        print('Cleanup policy creation test passed')
        "
    
    - name: Test cleanup rule management
      run: |
        python -c "
        from pheno.infra.cleanup_policies import CleanupPolicyManager, CleanupStrategy, ResourceType
        manager = CleanupPolicyManager()
        policy = manager.create_default_policy(
            project_name='test-project',
            strategy=CleanupStrategy.MODERATE
        )
        manager.update_project_rule(
            project_name='test-project',
            resource_type=ResourceType.PROCESS,
            strategy=CleanupStrategy.AGGRESSIVE,
            patterns=['test-project-*'],
            max_age=1800.0,
            force_cleanup=True
        )
        updated_policy = manager.get_project_policy('test-project')
        assert updated_policy.rules[ResourceType.PROCESS].strategy == CleanupStrategy.AGGRESSIVE
        print('Cleanup rule management test passed')
        "

  # Status monitoring tests
  status-monitoring:
    runs-on: ubuntu-latest
    needs: smoke-tests
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,test]"
    
    - name: Test service status update
      run: |
        python -c "
        from pheno.infra.fallback_site.status_pages import StatusPageManager
        manager = StatusPageManager()
        manager.update_service_status(
            project_name='test-project',
            service_name='test-service',
            status='running',
            port=8000,
            health_status='healthy'
        )
        project_status = manager.get_project_status('test-project')
        assert project_status is not None
        assert 'test-service' in project_status.services
        print('Service status update test passed')
        "
    
    - name: Test tunnel status update
      run: |
        python -c "
        from pheno.infra.fallback_site.status_pages import StatusPageManager
        manager = StatusPageManager()
        manager.update_tunnel_status(
            project_name='test-project',
            service_name='test-service',
            status='active',
            hostname='test.example.com',
            provider='cloudflare'
        )
        project_status = manager.get_project_status('test-project')
        assert project_status is not None
        assert 'test-service' in project_status.tunnels
        print('Tunnel status update test passed')
        "
    
    - name: Test status page generation
      run: |
        python -c "
        from pheno.infra.fallback_site.status_pages import StatusPageManager
        manager = StatusPageManager()
        manager.update_service_status(
            project_name='test-project',
            service_name='test-service',
            status='running',
            port=8000,
            health_status='healthy'
        )
        status_page = manager.generate_status_page('test-project', 'status')
        assert status_page is not None
        assert 'test-project' in status_page
        print('Status page generation test passed')
        "

  # Configuration tests
  configuration:
    runs-on: ubuntu-latest
    needs: smoke-tests
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,test]"
    
    - name: Test configuration loading
      run: |
        python -c "
        from pheno.infra.config_schemas import KInfraConfigManager
        manager = KInfraConfigManager()
        config = manager.load()
        assert config is not None
        assert config.app_name is not None
        print('Configuration loading test passed')
        "
    
    - name: Test project configuration
      run: |
        python -c "
        from pheno.infra.config_schemas import KInfraConfigManager, create_default_project_config
        manager = KInfraConfigManager()
        project_config = create_default_project_config('test-project')
        manager.set_project_config('test-project', project_config)
        retrieved_config = manager.get_project_config('test-project')
        assert retrieved_config is not None
        assert retrieved_config.project_name == 'test-project'
        print('Project configuration test passed')
        "
    
    - name: Test configuration export/import
      run: |
        python -c "
        from pheno.infra.config_schemas import KInfraConfigManager
        import tempfile
        manager = KInfraConfigManager()
        config = manager.load()
        with tempfile.NamedTemporaryFile(mode='w', suffix='.yaml', delete=False) as f:
            manager.save_config(config, f.name)
            new_manager = KInfraConfigManager(f.name)
            new_config = new_manager.load()
            assert new_config.app_name == config.app_name
        print('Configuration export/import test passed')
        "

  # CLI tests
  cli-tests:
    runs-on: ubuntu-latest
    needs: smoke-tests
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,test]"
    
    - name: Test CLI commands
      run: |
        # Test configuration commands
        kinfra config init --project test-project
        kinfra config show --project test-project
        
        # Test process commands
        kinfra process register test-project test-service 12345 \
          --command-line '["python", "test.py"]' \
          --environment '{"TEST": "true"}' \
          --scope local \
          --resource-type test \
          --tags "test"
        
        kinfra process list --project test-project
        kinfra process stats
        
        # Test tunnel commands
        kinfra tunnel create test-project test-service 8000 \
          --provider cloudflare \
          --reuse
        
        kinfra tunnel list --project test-project
        kinfra tunnel stats
        
        # Test cleanup commands
        kinfra cleanup init-project test-project --strategy moderate
        kinfra cleanup show-policy test-project
        
        # Test status commands
        kinfra status update test-project test-service \
          --status running \
          --health healthy \
          --port 8000
        
        kinfra status show-project test-project
        kinfra status list-projects
        
        # Test resource commands
        kinfra resource deploy test-redis redis --mode global
        kinfra resource list
        kinfra resource status test-redis
        
        # Test project commands
        kinfra project start test-project --services test-service
        kinfra project status test-project
        kinfra project list
        
        # Test global commands
        kinfra stats
        kinfra health
        kinfra version
        
        echo "All CLI commands executed successfully"

  # Performance tests
  performance-tests:
    runs-on: ubuntu-latest
    needs: [smoke-tests, integration-tests]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,test]"
        pip install pytest-benchmark
    
    - name: Run performance tests
      run: |
        python -m pytest tests/performance/ -v --benchmark-only --benchmark-json=performance-results.json
    
    - name: Upload performance results
      uses: actions/upload-artifact@v3
      with:
        name: performance-results
        path: performance-results.json

  # Security tests
  security-tests:
    runs-on: ubuntu-latest
    needs: smoke-tests
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,test]"
    
    - name: Run security scan
      run: |
        bandit -r src/pheno/infra/ -f json -o security-report.json
        bandit -r src/pheno/infra/
    
    - name: Upload security report
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: security-report.json

  # Documentation tests
  docs-tests:
    runs-on: ubuntu-latest
    needs: smoke-tests
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,test]"
    
    - name: Test documentation
      run: |
        python -m pytest --doctest-modules docs/ src/
    
    - name: Check documentation coverage
      run: |
        interrogate -v --fail-under 80 src/pheno/infra/

  # Final status check
  final-status:
    runs-on: ubuntu-latest
    needs: [lint-and-check, smoke-tests, integration-tests, process-governance, tunnel-governance, cleanup-policies, status-monitoring, configuration, cli-tests, performance-tests, security-tests, docs-tests]
    if: always()
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,test]"
    
    - name: Run final status check
      run: |
        echo "=== KInfra Phase 5 CI Status ==="
        echo "Lint and Check: ${{ needs.lint-and-check.result }}"
        echo "Smoke Tests: ${{ needs.smoke-tests.result }}"
        echo "Integration Tests: ${{ needs.integration-tests.result }}"
        echo "Process Governance: ${{ needs.process-governance.result }}"
        echo "Tunnel Governance: ${{ needs.tunnel-governance.result }}"
        echo "Cleanup Policies: ${{ needs.cleanup-policies.result }}"
        echo "Status Monitoring: ${{ needs.status-monitoring.result }}"
        echo "Configuration: ${{ needs.configuration.result }}"
        echo "CLI Tests: ${{ needs.cli-tests.result }}"
        echo "Performance Tests: ${{ needs.performance-tests.result }}"
        echo "Security Tests: ${{ needs.security-tests.result }}"
        echo "Documentation Tests: ${{ needs.docs-tests.result }}"
        
        # Check if all required jobs passed
        if [[ "${{ needs.lint-and-check.result }}" == "success" && 
              "${{ needs.smoke-tests.result }}" == "success" && 
              "${{ needs.integration-tests.result }}" == "success" && 
              "${{ needs.process-governance.result }}" == "success" && 
              "${{ needs.tunnel-governance.result }}" == "success" && 
              "${{ needs.cleanup-policies.result }}" == "success" && 
              "${{ needs.status-monitoring.result }}" == "success" && 
              "${{ needs.configuration.result }}" == "success" && 
              "${{ needs.cli-tests.result }}" == "success" ]]; then
          echo "✅ All KInfra Phase 5 CI checks passed!"
          exit 0
        else
          echo "❌ Some KInfra Phase 5 CI checks failed!"
          exit 1
        fi