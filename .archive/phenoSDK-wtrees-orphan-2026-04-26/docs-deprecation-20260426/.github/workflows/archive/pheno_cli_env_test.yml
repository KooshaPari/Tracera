name: pheno_cli_env_test

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: pip install --upgrade pip pytest
      - name: Run pheno_cli env integration test (isolated)
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
        run: |
          python -m pytest -q -c /dev/null pheno_cli/tests/test_env_integration.py
