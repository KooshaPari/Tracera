name: Security Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 12 * * 1'  # Weekly on Monday

jobs:
  security-tests:
    name: Security Test Suite
    runs-on: ubuntu-latest
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONPATH: .:src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,security,security-scanners]"
          pip install semgrep

      - name: Run security tests
        run: |
          pytest tests/security/ -v --tb=short

      - name: Run Bandit security scan
        run: |
          bandit -r src/ -f json -o bandit-report.json

      - name: Run Safety vulnerability scan
        run: |
          safety check --json --output safety-report.json

      - name: Run Semgrep security scan
        run: |
          semgrep --config=auto . --json --output=semgrep-report.json

      - name: Run pip-audit
        run: |
          pip-audit --format json --output pip-audit-report.json

      - name: Run detect-secrets and trufflehog
        run: |
          detect-secrets scan --all-files --json . > detect-secrets.json
          trufflehog filesystem --no-update --json . > trufflehog.json

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.14.0
        with:
          scan-type: 'fs'
          format: 'json'
          output: 'trivy-fs.json'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true

      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@0.14.0
        with:
          scan-type: 'config'
          format: 'json'
          output: 'trivy-config.json'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true

      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-results
          path: |
            bandit-report.json
            safety-report.json
            semgrep-report.json
            pip-audit-report.json
            detect-secrets.json
            trufflehog.json
            trivy-fs.json
            trivy-config.json
