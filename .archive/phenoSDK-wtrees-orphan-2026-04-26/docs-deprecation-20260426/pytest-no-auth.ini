[pytest]
minversion = 7.4
addopts =
    --strict-markers
    -m "not requires_auth"
    --color=yes
    --durations=10
testpaths =
    test
norecursedirs =
    .git
    .venv
env =
    PYTHONPATH=.:zen-mcp-server:zen-mcp-server/src
    MCP_AUTH_BYPASS=1
filterwarnings =
    error
    ignore::DeprecationWarning
