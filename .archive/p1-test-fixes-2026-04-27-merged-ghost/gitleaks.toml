# Gitleaks configuration for phenotype/repos
# https://github.com/gitleaks/gitleaks

[allowlist]
  description = "Public placeholders and examples"
  files = [
    "^\\.env\\.example$",
    "^\\.env\\.template$",
    "^docs/.*$",
    "^\\.github/.*$"
  ]

  # Allow known test/dev placeholder patterns
  regexes = [
    "^agileplus-dev$",
    "^dev-secret-key-change-in-prod$",
    "^your-.+-here$",
    "^CHANGE_ME_IN_PROD$",
    "^PLACEHOLDER_"
  ]

[[rules]]
  id = "openrouter-api-key"
  description = "OpenRouter API Key"
  regex = '''sk-or-v1-[a-f0-9]{32,}'''
  entropy = 4.5

[[rules]]
  id = "minimax-api-key"
  description = "MiniMax API Key"
  regex = '''eyJ[a-zA-Z0-9_-]*\.eyJ[a-zA-Z0-9_-]*\.[a-zA-Z0-9_-]*'''
  entropy = 4.0

[[rules]]
  id = "kilo-api-key"
  description = "Kilo API Key"
  regex = '''nvapi-[a-zA-Z0-9_-]{20,}'''

[[rules]]
  id = "nim-api-key"
  description = "NVIDIA NIM API Key"
  regex = '''nvapi-[a-zA-Z0-9_-]{20,}'''

[[rules]]
  id = "github-oauth-token"
  description = "GitHub OAuth Token"
  regex = '''ghp_[a-zA-Z0-9]{36,}'''
  entropy = 4.5

[[rules]]
  id = "github-fine-grained-pat"
  description = "GitHub Fine-Grained PAT"
  regex = '''github_pat_[a-zA-Z0-9_]{22,}$'''
  entropy = 4.5

[[rules]]
  id = "generic-api-key"
  description = "Generic API Key"
  regex = '''(api[_-]?key|apikey|api[_-]?secret)[=:\s]+['"]?[a-zA-Z0-9_-]{20,}['"]?'''
  entropy = 4.0

[[rules]]
  id = "aws-access-key"
  description = "AWS Access Key"
  regex = '''AKIA[0-9A-Z]{16}'''

[[rules]]
  id = "slack-token"
  description = "Slack Token"
  regex = '''xox[baprs]-[0-9]{10,13}-[0-9]{10,13}[a-zA-Z0-9-]*'''

[[rules]]
  id = "private-key"
  description = "Private Key"
  regex = '''-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'''
