[graph]
all-features = true

[advisories]
version = 2
ignore = [
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained - transitive dep, no action needed
    "RUSTSEC-2025-0140", # time non-utf8 TimeBuf::as_str - transitive dep, low impact
    "RUSTSEC-2026-0049", # rustls-webpki CRL distribution point matching - transitive dep, low impact
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "BlueOak-1.0.0",
    "CDLA-Permissive-2.0",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
