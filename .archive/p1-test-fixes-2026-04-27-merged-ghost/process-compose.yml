version: "0.5"

environment:
  - RUST_BACKTRACE=1

processes:
  nats:
    command: nats-server -js -p 4222 -m 8222
    depends_on: {}
    readiness_probe:
      http_get:
        host: localhost
        port: 8222
        path: /healthz
    availability:
      restart: on_failure
      backoff_seconds: 2
    log_location: .agileplus/logs/nats.log
    environment:
      - NATS_LOG_FILE=.agileplus/logs/nats.log

  dragonfly:
    command: redis-server --port 6379
    depends_on:
      nats:
        condition: process_healthy
    readiness_probe:
      exec:
        command: redis-cli -p 6379 ping
    availability:
      restart: on_failure
      backoff_seconds: 2
    log_location: .agileplus/logs/dragonfly.log

  neo4j:
    command: docker run --rm -p 7474:7474 -p 7687:7687 -e NEO4J_AUTH=neo4j/agileplus neo4j:5
    depends_on:
      dragonfly:
        condition: process_healthy
    readiness_probe:
      http_get:
        host: localhost
        port: 7474
        path: /
    availability:
      restart: on_failure
      backoff_seconds: 2
    log_location: .agileplus/logs/neo4j.log
    environment:
      - NEO4J_AUTH=neo4j/agileplus

  minio:
    command: minio server /data --address :9000 --console-address :9001
    depends_on:
      neo4j:
        condition: process_healthy
    readiness_probe:
      http_get:
        host: localhost
        port: 9000
        path: /minio/health/live
    availability:
      restart: on_failure
      backoff_seconds: 2
    log_location: .agileplus/logs/minio.log
    environment:
      - MINIO_ROOT_USER=agileplus
      - MINIO_ROOT_PASSWORD=agileplus-dev

  agileplus-api:
    command: ./target/release/agileplus-api
    depends_on:
      nats:
        condition: process_healthy
      dragonfly:
        condition: process_healthy
      neo4j:
        condition: process_healthy
      minio:
        condition: process_healthy
    readiness_probe:
      http_get:
        host: localhost
        port: 8080
        path: /health
    availability:
      restart: on_failure
      backoff_seconds: 2
    log_location: .agileplus/logs/agileplus-api.log
    environment:
      - RUST_LOG=info
      - NATS_URL=nats://localhost:4222
      - DRAGONFLY_URL=redis://localhost:6379
      - NEO4J_URI=bolt://localhost:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=agileplus
      - MINIO_ENDPOINT=http://localhost:9000
      - MINIO_ACCESS_KEY=agileplus
      - MINIO_SECRET_KEY=agileplus-dev
      - MINIO_REGION=us-east-1

  agileplus-mcp:
    command: python -m agileplus_mcp.server
    depends_on:
      agileplus-api:
        condition: process_healthy
    readiness_probe:
      exec:
        command: echo "MCP server readiness check"
    availability:
      restart: on_failure
      backoff_seconds: 2
    log_location: .agileplus/logs/agileplus-mcp.log
    environment:
      - AGILEPLUS_API_URL=http://localhost:8080
