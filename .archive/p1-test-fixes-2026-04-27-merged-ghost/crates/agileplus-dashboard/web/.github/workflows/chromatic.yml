name: Chromatic Visual Testing

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  chromatic:
    name: Chromatic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: AgilePlus/crates/agileplus-dashboard/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: AgilePlus/crates/agileplus-dashboard/web

      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: AgilePlus/crates/agileplus-dashboard/web
          exitOnceUploaded: true
