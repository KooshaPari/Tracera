# Visual Testing Configuration for AgilePlus
# Free alternative to Applitools - uses Playwright screenshot comparison

app_name: "AgilePlus Dashboard"
batch_name: "AgilePlus Visual Tests"

# Viewport settings
viewport:
  width: 1920
  height: 1080

# Responsive breakpoints for testing
responsive_breakpoints:
  desktop: [1920, 1080]
  laptop: [1440, 900]
  tablet: [768, 1024]
  mobile: [375, 812]

# Visual test suites using Playwright
test_suites:
  kanban_board:
    - name: "Feature Board - Empty State"
      url: "/dashboard/features"
      assertions:
        - selector: "[data-testid='empty-state']"
          state: visible

    - name: "Feature Board - With Data"
      url: "/dashboard/features"
      setup: seed_test_features
      assertions:
        - selector: "[data-testid='kanban-column']"
          state: visible

  timeline_view:
    - name: "Timeline - Month View"
      url: "/dashboard/work-packages?view=timeline"
      assertions:
        - selector: "[data-testid='timeline-container']"
          state: visible

  sync_dashboard:
    - name: "Sync Status - Idle"
      url: "/dashboard/sync"
      assertions:
        - selector: "[data-testid='sync-status-idle']"
          state: visible

# Screenshot comparison settings
comparison:
  # Pixel match threshold (0-1, lower = stricter)
  threshold: 0.1

  # Ignore regions (dynamic content)
  ignore_regions:
    - selector: "[data-testid='timestamp']"
    - selector: "[data-testid='user-avatar']"
    - selector: ".sync-status-indicator"

  # Full page screenshots
  full_page: true

# CLI output validation (text-based, no visual)
cli_tests:
  - name: "Module List Output"
    command: "agileplus module list --format=json"
    expected_contains:
      - "module_id"
      - "module_name"
      - "status"

  - name: "Sync Status Output"
    command: "agileplus sync status"
    expected_contains:
      - "last_sync"
      - "pending_changes"

# Baseline management
baselines:
  auto_save: false
  update_on_change: true
  path: "tests/visual/baselines/"

# Free tools used:
# - Playwright screenshot comparison (built-in)
# - jest-image-snapshot (for JS tests)
# - backstopjs (open source CSS regression)
